# hyprtoolkit theme — drives hyprlauncher, hyprsysteminfo, etc.
# Matches the waybar aesthetic: dark translucent pills + cyan→mint accent.
# Color format: 0xAARRGGBB

# surfaces
background      = 0xE014161C
base            = 0xFF1A1D24
alternate_base  = 0xFF22262E

# text
text            = 0xFFCDD6F4
bright_text     = 0xFFFFFFFF

# accents (pulled from your Hyprland border gradient)
accent            = 0xFF33CCFF
accent_secondary  = 0xFF00FF99

# typography — Inter for UI, JBMono NF for mono bits
font_family            = Inter
font_family_monospace  = JetBrainsMono Nerd Font
font_size              = 13
small_font_size        = 11
h1_size                = 20
h2_size                = 16
h3_size                = 14

# geometry — matches waybar pill roundness
rounding_large = 12
rounding_small = 6

# icon theme — Papirus-Dark covers third-party apps (Chrome/Slack/Telegram/etc)
# Requires: sudo pacman -S papirus-icon-theme
icon_theme = Papirus-Dark
