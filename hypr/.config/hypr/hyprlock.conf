general {
    disable_loading_bar = true
    grace = 2
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path    = screenshot
    blur_passes = 3
    blur_size   = 8
    contrast    = 0.9
    brightness  = 0.7
}

# time
label {
    monitor  =
    text     = cmd[update:1000] echo "$(date +"%H:%M")"
    color    = rgba(205, 214, 244, 1.0)
    font_size   = 96
    font_family = Inter Bold
    position = 0, 160
    halign   = center
    valign   = center
}

# date
label {
    monitor  =
    text     = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color    = rgba(205, 214, 244, 0.9)
    font_size   = 22
    font_family = Inter
    position = 0, 80
    halign   = center
    valign   = center
}

# password input
input-field {
    monitor =
    size    = 340, 56
    outline_thickness = 2
    dots_size      = 0.28
    dots_spacing   = 0.4
    dots_center    = true
    outer_color    = rgba(51, 204, 255, 0.7)
    inner_color    = rgba(20, 22, 28, 0.85)
    font_color     = rgba(205, 214, 244, 1.0)
    fade_on_empty  = false
    placeholder_text = <i>password…</i>
    hide_input     = false
    check_color    = rgba(0, 255, 153, 0.9)
    fail_color     = rgba(243, 139, 168, 0.9)
    fail_text      = <b>$PAMFAIL ($ATTEMPTS)</b>
    rounding = 12
    position = 0, -40
    halign   = center
    valign   = center
}

# user label below
label {
    monitor  =
    text     = $USER
    color    = rgba(166, 173, 200, 0.9)
    font_size   = 14
    font_family = Inter
    position = 0, -120
    halign   = center
    valign   = center
}

label {
    monitor  =
    text     = <i>$LAYOUT</i>
    color    = rgba(166, 173, 200, 0.9)
    font_size   = 8
    font_family = Inter
    position = 0, -150
    halign   = center
    valign   = center
}
